# profiles.yml
# Set DUCKDB_PATH env var to point to your local banking.duckdb file.
# Default: ./local_warehouse/banking.duckdb (relative to project root)
#
# Set SILVER_PATH env var for the register_silver_sources macro.
# Default: ./local_warehouse/delta/silver (relative to project root)
#
# Example:
#   export DUCKDB_PATH=/home/user/Banking_Pipeline/local_warehouse/banking.duckdb
#   export SILVER_PATH=/home/user/Banking_Pipeline/local_warehouse/delta/silver
#   cd banking_dbt && dbt run

banking_local:
  target: dev
  outputs:

    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', '../local_warehouse/banking.duckdb') }}"
      schema: banking_dev
      threads: 1
      extensions:
        - parquet
        - json

    # CLOUD — Databricks (fill in when Azure is ready)
    prod:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST', '') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH', '') }}"
      token: "{{ env_var('DATABRICKS_TOKEN', '') }}"
      schema: banking_prod
      threads: 8
